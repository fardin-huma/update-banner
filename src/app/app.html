<main class="page-shell" aria-labelledby="app-title">
  <section class="hero-card">
    <p class="eyebrow">Release cockpit</p>
    <h1 id="app-title">{{ title() }}</h1>
    <p class="subtitle">
      Ship updates with confidence. Build once, deploy fast, and keep every banner clean,
      visible, and versioned.
    </p>

    <div class="meta-row" aria-label="Application metadata">
      <span class="version-pill">Version {{ version() }}</span>
      <span class="status-dot" aria-hidden="true"></span>
      <span class="status-text">Live on GitHub Pages</span>
    </div>

    <div class="chip-grid" aria-label="Key highlights">
      @for (chip of chips; track chip) {
        <span class="chip">{{ chip }}</span>
      }
    </div>
  </section>
</main>
